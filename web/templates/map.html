<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkyWatch Pilot — Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="app-shell fade-in">
      <header class="topbar">
        <h1 class="brand brand-mark">SkyWatch Pilot</h1>
        <nav class="nav">
          <a href="/drones" data-testid="nav-drones">My drones</a>
          <a class="active" href="/map" data-testid="nav-map">Map</a>
          <a href="/alerts" data-testid="nav-alerts">Alerts</a>
          <span id="pilot-name" data-testid="pilot-name"></span>
          <button class="btn-ghost" type="button" id="logout-btn" data-testid="logout-btn">Log out</button>
        </nav>
      </header>

      <section class="panel map-panel">
        <h2 class="page-title">Fleet map</h2>
        <p class="page-sub">
          Live positions for your drones. Click a marker for detail.
          <span id="last-refreshed" data-testid="map-last-refreshed" class="hint" style="display:inline;margin:0"></span>
        </p>
        <div class="filter-bar" data-testid="filter-bar">
          <label class="filter-field">
            Status
            <select id="filter-status" data-testid="filter-status">
              <option value="all">All</option>
              <option value="flying">Flying</option>
              <option value="idle">Idle</option>
              <option value="offline">Offline</option>
            </select>
          </label>
          <label class="filter-field">
            Alerts
            <select id="filter-alerts" data-testid="filter-alerts">
              <option value="all">All</option>
              <option value="alert">Has alert</option>
            </select>
          </label>
          <span class="filter-count" id="filter-count" data-testid="filter-count"></span>
        </div>
        <div id="fleet-map" class="fleet-map" data-testid="fleet-map"></div>
        <div class="map-legend" data-testid="map-legend">
          <span><i class="dot flying"></i> flying</span>
          <span><i class="dot idle"></i> idle</span>
          <span><i class="dot offline"></i> offline</span>
          <span><i class="dot alert"></i> has alert</span>
          <span><i class="path-sample"></i> flight path</span>
          <span><i class="geofence-sample"></i> geofence</span>
        </div>
        <p class="error" id="page-error" aria-live="polite"></p>
      </section>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/map.js"></script>
  </body>
</html>
