<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkyWatch Pilot — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-hero panel">
        <h1 class="brand brand-mark">SkyWatch Pilot</h1>
        <p>Monitor your drones. Catch low battery and offline alerts before they cost a flight.</p>
        <form class="login-form" id="login-form" data-testid="login-form">
          <label>
            Email
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="username"
              data-testid="login-email"
              value="pilot@demo.com"
              required
            />
          </label>
          <label>
            Password
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              data-testid="login-password"
              value="demo123"
              required
            />
          </label>
          <p class="error" id="login-error" data-testid="login-error" aria-live="polite"></p>
          <button class="btn" type="submit" data-testid="login-submit">Enter</button>
        </form>
        <p class="hint">Demo: pilot@demo.com / demo123</p>
      </section>
    </main>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/login.js"></script>
  </body>
</html>
