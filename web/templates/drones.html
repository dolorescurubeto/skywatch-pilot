<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkyWatch Pilot — My drones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="app-shell fade-in">
      <header class="topbar">
        <h1 class="brand brand-mark">SkyWatch Pilot</h1>
        <nav class="nav">
          <a class="active" href="/drones" data-testid="nav-drones">My drones</a>
          <a href="/map" data-testid="nav-map">Map</a>
          <a href="/alerts" data-testid="nav-alerts">Alerts</a>
          <a class="nav-profile" href="/profile" id="pilot-name" data-testid="nav-profile"></a>
          <button class="btn-ghost" type="button" id="logout-btn" data-testid="logout-btn">Log out</button>
        </nav>
      </header>

      <section class="panel">
        <h2 class="page-title">My drones</h2>
        <p class="page-sub">
          Live status for your fleet. Click a row for detail.
          <span id="last-refreshed" data-testid="last-refreshed" class="hint" style="display:inline;margin:0"></span>
        </p>
        <div class="filter-bar" data-testid="filter-bar">
          <label class="filter-field">
            Status
            <select id="filter-status" data-testid="filter-status">
              <option value="all">All</option>
              <option value="flying">Flying</option>
              <option value="idle">Idle</option>
              <option value="offline">Offline</option>
            </select>
          </label>
          <label class="filter-field">
            Alerts
            <select id="filter-alerts" data-testid="filter-alerts">
              <option value="all">All</option>
              <option value="alert">Has alert</option>
            </select>
          </label>
          <label class="filter-field filter-search-field">
            Search
            <input
              type="search"
              id="filter-search"
              data-testid="filter-search"
              placeholder="Name or id…"
              autocomplete="off"
            />
          </label>
          <span class="filter-count" id="filter-count" data-testid="filter-count"></span>
        </div>
        <div class="table-wrap">
          <table data-testid="drones-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Status</th>
                <th>Battery</th>
                <th>Last signal</th>
                <th>Alert</th>
              </tr>
            </thead>
            <tbody id="drones-body"></tbody>
          </table>
        </div>
        <p class="error" id="page-error" aria-live="polite"></p>
      </section>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/drones.js"></script>
  </body>
</html>
